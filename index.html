<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Media Landscape</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: #2a2d36;
    --border2: #363a47;
    --text: #e8eaf0;
    --text2: #9199a8;
    --text3: #5c6272;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --green: #4fffb0;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* HEADER */
  .header { padding: 28px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .header-left h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-left h1 span { color: var(--accent); }
  .header-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-wrap input { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px 8px 34px; width: 260px; outline: none; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
  .brazil-toggle { display: flex; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 12px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); transition: all .15s; user-select: none; }
  .brazil-toggle.active { border-color: var(--green); color: var(--green); background: rgba(79,255,176,0.06); }
  .brazil-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background .15s; }
  .brazil-toggle.active .brazil-dot { background: var(--green); }

  /* STATS */
  .stats-bar { padding: 10px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .stats-bar span { color: var(--text2); }

  /* CATEGORY FILTERS */
  .cat-tag-bar { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .cat-tag-bar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; flex-shrink: 0; }
  .cat-filter-tag { display: inline-flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid; cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap; }
  .cat-filter-tag:hover { opacity: 1 !important; filter: brightness(1.15); }
  .cat-filter-tag .tag-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .cat-filter-tag .tag-count { font-size: 9.5px; opacity: 0.6; }
  .all-tag { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; user-select: none; white-space: nowrap; }
  .all-tag.active { background: var(--accent); border-color: var(--accent); color: #0b0c0f; font-weight: 600; }

  /* MAIN */
  .main { padding: 24px 32px 60px; max-width: 1400px; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; height: 300px; flex-direction: column; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

  /* ERROR */
  .error-box { padding: 32px; text-align: center; border: 1px solid rgba(255,107,107,0.3); border-radius: var(--radius); background: rgba(255,107,107,0.05); margin: 24px 0; }
  .error-box h3 { color: #ff6b6b; font-family: 'Syne', sans-serif; margin-bottom: 8px; }
  .error-box p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

  /* ACCORDION */
  .category-section { margin-bottom: 6px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s; }
  .category-section:hover { border-color: var(--border2); }
  .category-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; background: var(--surface); user-select: none; transition: background .15s; }
  .category-header:hover, .category-header.open { background: var(--surface2); }
  .cat-left { display: flex; align-items: center; gap: 10px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
  .cat-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 1px 8px; }
  .cat-chevron { color: var(--text3); font-size: 11px; transition: transform .2s; }
  .cat-chevron.open { transform: rotate(180deg); }

  /* GRIDS */
  .company-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
  .company-grid.open { display: grid; }
  .flat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .filtered-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .filtered-cat-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .filtered-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }

  /* CARDS */
  .company-card { background: var(--bg); padding: 14px 16px; cursor: pointer; transition: background .12s; }
  .company-card:hover { background: var(--surface); }
  .company-card.selected { background: var(--surface2); }
  .card-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .brazil-badge { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; opacity: 0; transition: opacity .15s; }
  .brazil-badge.visible { opacity: 1; }
  .card-what { font-size: 11.5px; color: var(--text2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .card-cat-tag { font-size: 9.5px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 3px; border: 1px solid; opacity: 0.65; }

  /* DETAIL PANEL */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; backdrop-filter: blur(3px); align-items: center; justify-content: center; }
  .detail-overlay.open { display: flex; }
  .detail-panel { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; width: 90%; max-width: 680px; max-height: 85vh; overflow-y: auto; padding: 28px 32px; position: relative; animation: slideUp .2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .detail-close { position: absolute; top: 18px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 16px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .12s; }
  .detail-close:hover { border-color: var(--border2); color: var(--text); }
  .detail-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); margin-bottom: 6px; padding-right: 40px; }
  .detail-cats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
  .detail-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .detail-brazil { display: flex; align-items: flex-start; gap: 8px; background: rgba(79,255,176,0.05); border: 1px solid rgba(79,255,176,0.15); border-radius: var(--radius-sm); padding: 10px 14px; }
  .detail-brazil-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 4px; }
  .detail-brazil-text { font-size: 12.5px; color: var(--text2); line-height: 1.5; }
  .detail-url a { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2); text-decoration: none; padding: 6px 10px; border: 1px solid rgba(71,200,255,0.2); border-radius: var(--radius-sm); transition: all .12s; }
  .detail-url a:hover { background: rgba(71,200,255,0.06); border-color: rgba(71,200,255,0.4); }
  .no-results { padding: 60px 20px; text-align: center; color: var(--text3); }
  .no-results p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.05em; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Digital Media <span>Landscape</span></h1>
    <div class="header-meta" id="header-meta">Loading from Notion...</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Search companies, categories..." autocomplete="off">
    </div>
    <div class="brazil-toggle" id="brazil-toggle" onclick="toggleBrazil()">
      <div class="brazil-dot"></div>
      🇧🇷 Brazil only
    </div>
  </div>
</div>

<div class="stats-bar">
  <span id="stat-companies">—</span> companies &nbsp;·&nbsp;
  <span id="stat-cats">—</span> categories &nbsp;·&nbsp;
  <span id="stat-brazil">—</span> with Brazil presence
</div>

<div class="cat-tag-bar" id="cat-tag-bar">
  <span class="cat-tag-bar-label">Filter</span>
</div>

<div class="main" id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Fetching from Notion...</p>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
const CAT_COLORS = {
  'Audience & Data Analytics':    {bg:'rgba(71,200,255,0.08)',border:'rgba(71,200,255,0.25)',dot:'#47c8ff'},
  'Attention Measurement':        {bg:'rgba(255,215,71,0.08)',border:'rgba(255,215,71,0.25)',dot:'#ffd747'},
  'Attribution & MMM':            {bg:'rgba(79,255,176,0.08)',border:'rgba(79,255,176,0.25)',dot:'#4fffb0'},
  'Media Verification & Quality': {bg:'rgba(255,107,107,0.08)',border:'rgba(255,107,107,0.25)',dot:'#ff6b6b'},
  'Brand Measurement':            {bg:'rgba(255,147,214,0.08)',border:'rgba(255,147,214,0.25)',dot:'#ff93d6'},
  'Identity & Data':              {bg:'rgba(178,147,255,0.08)',border:'rgba(178,147,255,0.25)',dot:'#b293ff'},
  'Clean Room':                   {bg:'rgba(147,255,178,0.08)',border:'rgba(147,255,178,0.25)',dot:'#93ffb2'},
  'DSP / Programmatic':           {bg:'rgba(255,165,71,0.08)',border:'rgba(255,165,71,0.25)',dot:'#ffa547'},
  'CTV & Streaming':              {bg:'rgba(71,147,255,0.08)',border:'rgba(71,147,255,0.25)',dot:'#4793ff'},
  'DOOH & OOH':                   {bg:'rgba(255,215,71,0.08)',border:'rgba(255,215,71,0.25)',dot:'#ffd747'},
  'Audio & Podcast':              {bg:'rgba(147,165,175,0.08)',border:'rgba(147,165,175,0.25)',dot:'#93a5af'},
  'Native & Content Discovery':   {bg:'rgba(175,147,121,0.08)',border:'rgba(175,147,121,0.25)',dot:'#af9379'},
  'Social Advertising':           {bg:'rgba(255,107,147,0.08)',border:'rgba(255,107,147,0.25)',dot:'#ff6b93'},
  'Retail Media':                 {bg:'rgba(255,107,147,0.08)',border:'rgba(255,107,147,0.25)',dot:'#ff6b93'},
  'Mobile & App Marketing':       {bg:'rgba(178,107,255,0.08)',border:'rgba(178,107,255,0.25)',dot:'#b26bff'},
  'Affiliate & Performance':      {bg:'rgba(79,255,176,0.08)',border:'rgba(79,255,176,0.25)',dot:'#4fffb0'},
  'Search Advertising':           {bg:'rgba(71,200,255,0.08)',border:'rgba(71,200,255,0.25)',dot:'#47c8ff'},
  'CRM':                          {bg:'rgba(175,140,107,0.08)',border:'rgba(175,140,107,0.25)',dot:'#af8c6b'},
  'Social & Community Management':{bg:'rgba(255,147,214,0.08)',border:'rgba(255,147,214,0.25)',dot:'#ff93d6'},
  'SEO & Content Marketing':      {bg:'rgba(79,255,176,0.08)',border:'rgba(79,255,176,0.25)',dot:'#4fffb0'},
  'CDP':                          {bg:'rgba(178,147,255,0.08)',border:'rgba(178,147,255,0.25)',dot:'#b293ff'},
  'Contextual & Brand Safety':    {bg:'rgba(147,165,175,0.08)',border:'rgba(147,165,175,0.25)',dot:'#93a5af'},
  'Intelligence & Research':      {bg:'rgba(255,165,71,0.08)',border:'rgba(255,165,71,0.25)',dot:'#ffa547'},
  'Creative & Production':        {bg:'rgba(255,215,71,0.08)',border:'rgba(255,215,71,0.25)',dot:'#ffd747'},
  'Creator Economy':              {bg:'rgba(255,107,107,0.08)',border:'rgba(255,107,107,0.25)',dot:'#ff6b6b'},
};
const DEFAULT_COLOR = {bg:'rgba(150,150,150,0.08)',border:'rgba(150,150,150,0.25)',dot:'#969696'};

let allCompanies = [];
let brazilOnly = false;
let searchQuery = '';
let activeCategory = null;
let openCategories = new Set();
let selectedId = null;

function catColor(cat) { return CAT_COLORS[cat] || DEFAULT_COLOR; }

function hasBrazil(c) {
  const b = (c.brazil || '').toLowerCase();
  return b.length > 0 && !b.startsWith('not confirmed') && !b.startsWith('no —') && !b.startsWith('no -');
}

function matchesSearch(c, q) {
  if (!q) return true;
  const hay = [c.name, c.what, c.how, c.brazil, ...(c.categories||[])].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase());
}

function getFiltered() {
  return allCompanies.filter(c => {
    if (brazilOnly && !hasBrazil(c)) return false;
    if (searchQuery && !matchesSearch(c, searchQuery)) return false;
    if (activeCategory && !(c.categories||[]).includes(activeCategory)) return false;
    return true;
  });
}

function buildTagBar() {
  const bar = document.getElementById('cat-tag-bar');
  const counts = new Map();
  allCompanies.forEach(c => (c.categories||[]).forEach(cat => counts.set(cat, (counts.get(cat)||0)+1)));
  const sorted = [...counts.keys()].sort((a,b) => a.localeCompare(b));
  let html = '<span class="cat-tag-bar-label">Filter</span>';
  html += `<div class="all-tag ${activeCategory===null?'active':''}" onclick="setCategory(null)">All</div>`;
  sorted.forEach(cat => {
    const c = catColor(cat);
    const isActive = activeCategory === cat;
    html += `<div class="cat-filter-tag" style="background:${isActive?c.bg:'transparent'};border-color:${c.border};color:${c.dot};opacity:${isActive?'1':'0.55'}" onclick="setCategory('${cat.replace(/'/g,"\\'")}')"><div class="tag-dot" style="background:${c.dot}"></div>${cat}<span class="tag-count">${counts.get(cat)}</span></div>`;
  });
  bar.innerHTML = html;
}

function setCategory(cat) { activeCategory = cat; buildTagBar(); renderMain(); }
function toggleBrazil() { brazilOnly = !brazilOnly; document.getElementById('brazil-toggle').classList.toggle('active', brazilOnly); renderMain(); }

function renderCard(c) {
  const tagHtml = (c.categories||[]).slice(0,2).map(cat => {
    const col = catColor(cat);
    return `<span class="card-cat-tag" style="color:${col.dot};border-color:${col.border};background:${col.bg}">${cat}</span>`;
  }).join('');
  return `<div class="company-card ${selectedId===c.id?'selected':''}" onclick="openDetail('${c.id}')">
    <div class="card-name">${c.name}<div class="brazil-badge ${hasBrazil(c)?'visible':''}"></div></div>
    <div class="card-what">${c.what||'—'}</div>
    <div class="card-tags">${tagHtml}</div>
  </div>`;
}

function renderMain() {
  const filtered = getFiltered();
  const main = document.getElementById('main');
  document.getElementById('header-meta').textContent = `${filtered.length} of ${allCompanies.length} companies · Live from Notion`;

  if (filtered.length === 0) {
    main.innerHTML = '<div class="no-results"><p>No companies match your filters.</p></div>';
    return;
  }

  if (activeCategory || searchQuery) {
    const title = activeCategory || `"${searchQuery}"`;
    const clr = activeCategory ? catColor(activeCategory) : DEFAULT_COLOR;
    main.innerHTML = `<div class="filtered-header">${activeCategory?`<div style="width:10px;height:10px;border-radius:50%;background:${clr.dot};flex-shrink:0"></div>`:''}<div class="filtered-cat-name">${title}</div><div class="filtered-count">${filtered.length} companies</div></div><div class="flat-grid">${filtered.map(renderCard).join('')}</div>`;
    return;
  }

  // Group by category
  const catMap = new Map();
  filtered.forEach(c => {
    if (!(c.categories||[]).length) {
      if (!catMap.has('Other')) catMap.set('Other', []);
      catMap.get('Other').push(c);
    } else {
      c.categories.forEach(cat => {
        if (!catMap.has(cat)) catMap.set(cat, []);
        catMap.get(cat).push(c);
      });
    }
  });

  const sorted = new Map([...catMap.entries()].sort((a,b) => a[0].localeCompare(b[0])));
  let html = '';
  sorted.forEach((companies, cat) => {
    const color = catColor(cat);
    const isOpen = openCategories.has(cat);
    html += `<div class="category-section">
      <div class="category-header ${isOpen?'open':''}" onclick="toggleAccordion('${cat.replace(/'/g,"\\'")}')">
        <div class="cat-left"><div class="cat-dot" style="background:${color.dot}"></div><div class="cat-name">${cat}</div><div class="cat-count">${companies.length}</div></div>
        <div class="cat-chevron ${isOpen?'open':''}">▾</div>
      </div>
      <div class="company-grid ${isOpen?'open':''}">${companies.map(renderCard).join('')}</div>
    </div>`;
  });
  main.innerHTML = html;
}

function toggleAccordion(cat) {
  if (openCategories.has(cat)) openCategories.delete(cat);
  else openCategories.add(cat);
  renderMain();
}

function openDetail(id) {
  const c = allCompanies.find(x => x.id === id);
  if (!c) return;
  selectedId = id;
  const catHtml = (c.categories||[]).map(cat => {
    const col = catColor(cat);
    return `<span class="card-cat-tag" style="font-size:11px;padding:3px 9px;color:${col.dot};border-color:${col.border};background:${col.bg}">${cat}</span>`;
  }).join('');
  const brazilHtml = c.brazil ? `<div class="detail-section"><div class="detail-label">🇧🇷 Brazil</div><div class="detail-brazil"><div class="detail-brazil-dot"></div><div class="detail-brazil-text">${c.brazil}</div></div></div>` : '';
  const urlHtml = c.url ? `<div class="detail-section detail-url"><a href="${c.url}" target="_blank">↗ ${c.url.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a></div>` : '';
  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-close" onclick="closeDetailBtn()">✕</div>
    <div class="detail-name">${c.name}</div>
    <div class="detail-cats">${catHtml}</div>
    ${c.what?`<div class="detail-section"><div class="detail-label">What they do</div><div class="detail-text">${c.what}</div></div>`:''}
    ${c.how?`<div class="detail-section"><div class="detail-label">How / Methodology</div><div class="detail-text">${c.how}</div></div>`:''}
    ${brazilHtml}${urlHtml}
    ${c.comments?`<div class="detail-section"><div class="detail-label">Comments</div><div class="detail-text">${c.comments}</div></div>`:''}
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) { if (e.target === document.getElementById('detail-overlay')) closeDetailBtn(); }
function closeDetailBtn() { document.getElementById('detail-overlay').classList.remove('open'); selectedId = null; }

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    if (searchQuery) activeCategory = null;
    buildTagBar();
    renderMain();
  }, 200);
});

// FETCH FROM NOTION via /api/notion
async function loadData() {
  try {
    const res = await fetch('/api/notion');
    if (!res.ok) throw new Error(`Server returned ${res.status}`);
    const data = await res.json();
    if (!data.companies) throw new Error('No companies in response');

    allCompanies = data.companies.sort((a,b) => a.name.localeCompare(b.name));

    const brazilCount = allCompanies.filter(hasBrazil).length;
    const catCount = new Set(allCompanies.flatMap(c => c.categories||[])).size;
    document.getElementById('stat-companies').textContent = allCompanies.length;
    document.getElementById('stat-cats').textContent = catCount;
    document.getElementById('stat-brazil').textContent = brazilCount;
    document.getElementById('header-meta').textContent = `${allCompanies.length} companies · ${catCount} categories · Live from Notion`;
    document.getElementById('loading').remove();
    buildTagBar();
    renderMain();

  } catch (err) {
    document.getElementById('loading').remove();
    document.getElementById('main').innerHTML = `
      <div class="error-box">
        <h3>Could not load data</h3>
        <p>${err.message}</p>
        <p style="margin-top:8px">Check that the Notion integration is connected and the token is set in Vercel.</p>
      </div>`;
  }
}

loadData();
