<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Media Landscape</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0c0f;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: #2a2d36;
    --border2: #363a47;
    --text: #e8eaf0;
    --text2: #9199a8;
    --text3: #5c6272;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b6b;
    --green: #4fffb0;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left h1 span { color: var(--accent); }

  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.03em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* SEARCH */
  .search-wrap { position: relative; }

  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px 8px 34px;
    width: 260px;
    outline: none;
    transition: border-color .15s;
  }

  .search-wrap input:focus { border-color: var(--border2); }
  .search-wrap input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }

  /* BRAZIL TOGGLE */
  .brazil-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    transition: all .15s;
    user-select: none;
  }

  .brazil-toggle:hover { border-color: var(--border2); }

  .brazil-toggle.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(79, 255, 176, 0.06);
  }

  .brazil-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text3);
    transition: background .15s;
  }

  .brazil-toggle.active .brazil-dot { background: var(--green); }

  /* STATS BAR */
  .stats-bar {
    padding: 10px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .stats-bar span { color: var(--text2); }

  /* CATEGORY TAG BAR */
  .cat-tag-bar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    align-items: center;
  }

  .cat-tag-bar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .cat-filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
    white-space: nowrap;
  }

  .cat-filter-tag:hover { opacity: 1 !important; filter: brightness(1.15); }

  .cat-filter-tag .tag-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-filter-tag .tag-count {
    font-size: 9.5px;
    opacity: 0.6;
  }

  .all-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
    white-space: nowrap;
  }

  .all-tag:hover { border-color: var(--text2); color: var(--text); }

  .all-tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0b0c0f;
    font-weight: 600;
  }

  /* MAIN */
  .main { padding: 24px 32px 60px; max-width: 1400px; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    flex-direction: column;
    gap: 12px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* CATEGORY SECTION (accordion, default view) */
  .category-section {
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .15s;
  }

  .category-section:hover { border-color: var(--border2); }

  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
    transition: background .15s;
  }

  .category-header:hover { background: var(--surface2); }
  .category-header.open { background: var(--surface2); }

  .cat-left { display: flex; align-items: center; gap: 10px; }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .cat-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 8px;
  }

  .cat-chevron {
    color: var(--text3);
    font-size: 11px;
    transition: transform .2s;
  }

  .cat-chevron.open { transform: rotate(180deg); }

  /* FLAT FILTERED VIEW header */
  .filtered-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .filtered-cat-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .filtered-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  /* COMPANY GRID */
  .company-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .company-grid.open { display: grid; }

  /* Flat grid (filtered view) */
  .flat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* COMPANY CARD */
  .company-card {
    background: var(--bg);
    padding: 14px 16px;
    cursor: pointer;
    transition: background .12s;
  }

  .company-card:hover { background: var(--surface); }
  .company-card.selected { background: var(--surface2); }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .brazil-badge {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .15s;
  }

  .brazil-badge.visible { opacity: 1; }

  .card-what {
    font-size: 11.5px;
    color: var(--text2);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }

  .card-cat-tag {
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid;
    opacity: 0.65;
  }

  /* DETAIL OVERLAY */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    backdrop-filter: blur(3px);
    align-items: center;
    justify-content: center;
  }

  .detail-overlay.open { display: flex; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 90%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px 32px;
    position: relative;
    animation: slideUp .2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-close {
    position: absolute;
    top: 18px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 16px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .12s;
  }

  .detail-close:hover { border-color: var(--border2); color: var(--text); }

  .detail-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 6px;
    padding-right: 40px;
  }

  .detail-cats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }

  .detail-section { margin-bottom: 18px; }

  .detail-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .detail-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

  .detail-brazil {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    background: rgba(79, 255, 176, 0.05);
    border: 1px solid rgba(79, 255, 176, 0.15);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
  }

  .detail-brazil-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    margin-top: 4px;
  }

  .detail-brazil-text { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

  .detail-url {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-decoration: none;
    padding: 6px 10px;
    border: 1px solid rgba(71, 200, 255, 0.2);
    border-radius: var(--radius-sm);
    transition: all .12s;
  }

  .detail-url:hover {
    background: rgba(71, 200, 255, 0.06);
    border-color: rgba(71, 200, 255, 0.4);
  }

  .comments-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .15s;
    line-height: 1.5;
  }

  .comments-area:focus { border-color: var(--border2); }
  .comments-area::placeholder { color: var(--text3); }

  .save-btn {
    margin-top: 8px;
    background: var(--accent);
    color: #0b0c0f;
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .12s;
    letter-spacing: 0.03em;
  }

  .save-btn:hover { opacity: 0.85; }
  .save-btn:disabled { opacity: 0.4; cursor: default; }

  .save-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    margin-left: 10px;
  }

  .save-status.success { color: var(--green); }
  .save-status.error { color: var(--accent3); }

  .no-results {
    padding: 60px 20px;
    text-align: center;
    color: var(--text3);
  }

  .no-results p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .error-msg {
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid rgba(255, 107, 107, 0.2);
    border-radius: var(--radius);
    padding: 20px 24px;
    color: var(--accent3);
    font-size: 13px;
    margin: 24px 0;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Digital Media <span>Landscape</span></h1>
    <div class="header-meta" id="header-meta">Loading...</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Search companies, categories, methods..." autocomplete="off">
    </div>
    <div class="brazil-toggle" id="brazil-toggle" onclick="toggleBrazil()">
      <div class="brazil-dot"></div>
      🇧🇷 Brazil only
    </div>
    <button onclick="downloadHTML()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;padding:7px 12px;cursor:pointer;transition:all .15s;white-space:nowrap;" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">⬇ Download HTML</button>
  </div>
</div>

<div class="stats-bar">
  <span id="stat-companies">—</span> companies &nbsp;·&nbsp;
  <span id="stat-cats">—</span> categories &nbsp;·&nbsp;
  <span id="stat-brazil">—</span> with Brazil presence
</div>

<div class="cat-tag-bar" id="cat-tag-bar">
  <span class="cat-tag-bar-label">Filter</span>
  <!-- populated by JS -->
</div>

<div class="main" id="main">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Fetching landscape data from Notion...</p>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
const NOTION_TOKEN = null; // handled server-side via /api/notion
const DATABASE_ID = 'a0b40aa9-05c4-4cbb-b680-458e6c329364';
const NOTION_VERSION = '2022-06-28';

const CAT_COLORS = {
  'Audience & Data Analytics':    { bg:'rgba(71,200,255,0.08)',  border:'rgba(71,200,255,0.25)',  dot:'#47c8ff' },
  'Attention Measurement':        { bg:'rgba(255,215,71,0.08)',  border:'rgba(255,215,71,0.25)',  dot:'#ffd747' },
  'Attribution & MMM':            { bg:'rgba(79,255,176,0.08)',  border:'rgba(79,255,176,0.25)',  dot:'#4fffb0' },
  'Media Verification & Quality': { bg:'rgba(255,107,107,0.08)', border:'rgba(255,107,107,0.25)', dot:'#ff6b6b' },
  'Brand Measurement':            { bg:'rgba(255,147,214,0.08)', border:'rgba(255,147,214,0.25)', dot:'#ff93d6' },
  'Identity & Data':              { bg:'rgba(178,147,255,0.08)', border:'rgba(178,147,255,0.25)', dot:'#b293ff' },
  'Clean Room':                   { bg:'rgba(147,255,178,0.08)', border:'rgba(147,255,178,0.25)', dot:'#93ffb2' },
  'DSP / Programmatic':           { bg:'rgba(255,165,71,0.08)',  border:'rgba(255,165,71,0.25)',  dot:'#ffa547' },
  'CTV & Streaming':              { bg:'rgba(71,147,255,0.08)',  border:'rgba(71,147,255,0.25)',  dot:'#4793ff' },
  'DOOH & OOH':                   { bg:'rgba(255,215,71,0.08)',  border:'rgba(255,215,71,0.25)',  dot:'#ffd747' },
  'Audio & Podcast':              { bg:'rgba(147,165,175,0.08)', border:'rgba(147,165,175,0.25)', dot:'#93a5af' },
  'Native & Content Discovery':   { bg:'rgba(175,147,121,0.08)', border:'rgba(175,147,121,0.25)', dot:'#af9379' },
  'Social Advertising':           { bg:'rgba(255,107,147,0.08)', border:'rgba(255,107,147,0.25)', dot:'#ff6b93' },
  'Retail Media':                 { bg:'rgba(255,107,147,0.08)', border:'rgba(255,107,147,0.25)', dot:'#ff6b93' },
  'Mobile & App Marketing':       { bg:'rgba(178,107,255,0.08)', border:'rgba(178,107,255,0.25)', dot:'#b26bff' },
  'Affiliate & Performance':      { bg:'rgba(79,255,176,0.08)',  border:'rgba(79,255,176,0.25)',  dot:'#4fffb0' },
  'Search Advertising':           { bg:'rgba(71,200,255,0.08)',  border:'rgba(71,200,255,0.25)',  dot:'#47c8ff' },
  'CRM':                          { bg:'rgba(175,140,107,0.08)', border:'rgba(175,140,107,0.25)', dot:'#af8c6b' },
  'Social & Community Management':{ bg:'rgba(255,147,214,0.08)', border:'rgba(255,147,214,0.25)', dot:'#ff93d6' },
  'SEO & Content Marketing':      { bg:'rgba(79,255,176,0.08)',  border:'rgba(79,255,176,0.25)',  dot:'#4fffb0' },
  'CDP':                          { bg:'rgba(178,147,255,0.08)', border:'rgba(178,147,255,0.25)', dot:'#b293ff' },
  'Contextual & Brand Safety':    { bg:'rgba(147,165,175,0.08)', border:'rgba(147,165,175,0.25)', dot:'#93a5af' },
  'Intelligence & Research':      { bg:'rgba(255,165,71,0.08)',  border:'rgba(255,165,71,0.25)',  dot:'#ffa547' },
  'Creative & Production':        { bg:'rgba(255,215,71,0.08)',  border:'rgba(255,215,71,0.25)',  dot:'#ffd747' },
  'Creator Economy':              { bg:'rgba(255,107,107,0.08)', border:'rgba(255,107,107,0.25)', dot:'#ff6b6b' },
};
const DEFAULT_COLOR = { bg:'rgba(150,150,150,0.08)', border:'rgba(150,150,150,0.25)', dot:'#969696' };

// STATE
let allCompanies = [];
let brazilOnly = false;
let searchQuery = '';
let activeCategory = null; // null = show all
let selectedCompanyId = null;
let openCategories = new Set();

// NOTION FETCH
async function fetchAllPages() {
  let results = [];
  let cursor = undefined;
  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const res = await fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        method: 'POST',
        path: `databases/${DATABASE_ID}/query`,
        body
      })
    });
    const parsed = await res.json();
    if (parsed.results) results = results.concat(parsed.results);
    cursor = parsed.has_more ? parsed.next_cursor : undefined;
  } while (cursor);
  return results;
}

function extractProp(page, key) {
  const prop = page.properties?.[key];
  if (!prop) return '';
  if (prop.type === 'title') return prop.title?.map(t => t.plain_text).join('') || '';
  if (prop.type === 'rich_text') return prop.rich_text?.map(t => t.plain_text).join('') || '';
  if (prop.type === 'multi_select') return prop.multi_select?.map(s => s.name) || [];
  if (prop.type === 'select') return prop.select?.name || '';
  if (prop.type === 'url') return prop.url || '';
  return '';
}

function parseCompany(page) {
  const name = extractProp(page, 'Company');
  if (!name || name.startsWith('🗑️')) return null;
  const brazil = extractProp(page, 'Brazil');
  const hasBrazil = brazil.length > 0 &&
    !brazil.toLowerCase().includes('not confirmed') &&
    !brazil.toLowerCase().includes('not present') &&
    !brazil.toLowerCase().includes('not publicly');
  return {
    id: page.id,
    name,
    categories: extractProp(page, 'Category') || [],
    what: extractProp(page, 'What they do'),
    how: extractProp(page, 'How / Methodology'),
    brazil,
    hasBrazil,
    url: extractProp(page, 'URL') || extractProp(page, 'userDefined:URL'),
    comments: extractProp(page, 'Comments'),
  };
}

function catColor(cat) { return CAT_COLORS[cat] || DEFAULT_COLOR; }

function hasBrazilPresence(c) { return c.hasBrazil; }

function matchesSearch(c, q) {
  if (!q) return true;
  const hay = [c.name, c.what, c.how, c.brazil, ...c.categories].join(' ').toLowerCase();
  return hay.includes(q.toLowerCase());
}

function getFiltered() {
  return allCompanies.filter(c => {
    if (brazilOnly && !hasBrazilPresence(c)) return false;
    if (searchQuery && !matchesSearch(c, searchQuery)) return false;
    if (activeCategory && !c.categories.includes(activeCategory)) return false;
    return true;
  });
}

// BUILD CATEGORY TAG BAR
function buildTagBar() {
  const bar = document.getElementById('cat-tag-bar');
  const catCounts = new Map();
  allCompanies.forEach(c => c.categories.forEach(cat => {
    catCounts.set(cat, (catCounts.get(cat) || 0) + 1);
  }));

  const sortedCats = [...catCounts.keys()].sort((a, b) => a.localeCompare(b));

  let html = '<span class="cat-tag-bar-label">Filter</span>';
  html += `<div class="all-tag ${activeCategory === null ? 'active' : ''}" onclick="setCategory(null)">All</div>`;

  sortedCats.forEach(cat => {
    const c = catColor(cat);
    const count = catCounts.get(cat);
    const isActive = activeCategory === cat;
    const opacity = isActive ? '1' : '0.55';
    html += `<div class="cat-filter-tag" 
      style="background:${isActive ? c.bg : 'transparent'};border-color:${c.border};color:${c.dot};opacity:${opacity}"
      onclick="setCategory('${cat.replace(/'/g, "\\'")}')">
      <div class="tag-dot" style="background:${c.dot}"></div>
      ${cat}
      <span class="tag-count">${count}</span>
    </div>`;
  });

  bar.innerHTML = html;
}

function setCategory(cat) {
  activeCategory = cat;
  buildTagBar();
  renderMain();
}

function toggleBrazil() {
  brazilOnly = !brazilOnly;
  document.getElementById('brazil-toggle').classList.toggle('active', brazilOnly);
  renderMain();
}

function renderMain() {
  const filtered = getFiltered();
  const main = document.getElementById('main');

  document.getElementById('header-meta').textContent =
    `${filtered.length} of ${allCompanies.length} companies · live from Notion`;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="no-results"><p>No companies match your filters.</p></div>`;
    return;
  }

  // FILTERED VIEW — flat grid
  if (activeCategory || searchQuery) {
    const title = activeCategory || `"${searchQuery}"`;
    const c = activeCategory ? catColor(activeCategory) : DEFAULT_COLOR;
    main.innerHTML = `
      <div class="filtered-header">
        ${activeCategory ? `<div style="width:10px;height:10px;border-radius:50%;background:${c.dot};flex-shrink:0"></div>` : ''}
        <div class="filtered-cat-name">${title}</div>
        <div class="filtered-count">${filtered.length} companies</div>
      </div>
      <div class="flat-grid">
        ${filtered.map(c => renderCard(c)).join('')}
      </div>`;
    return;
  }

  // DEFAULT VIEW — accordion by category
  const catMap = new Map();
  filtered.forEach(c => {
    if (c.categories.length === 0) {
      if (!catMap.has('Uncategorized')) catMap.set('Uncategorized', []);
      catMap.get('Uncategorized').push(c);
    } else {
      c.categories.forEach(cat => {
        if (!catMap.has(cat)) catMap.set(cat, []);
        catMap.get(cat).push(c);
      });
    }
  });

  const sorted = new Map([...catMap.entries()].sort((a, b) => a[0].localeCompare(b[0])));

  let html = '';
  sorted.forEach((companies, cat) => {
    const color = catColor(cat);
    const isOpen = openCategories.has(cat);
    html += `
      <div class="category-section">
        <div class="category-header ${isOpen ? 'open' : ''}" onclick="toggleAccordion('${cat.replace(/'/g, "\\'")}')">
          <div class="cat-left">
            <div class="cat-dot" style="background:${color.dot}"></div>
            <div class="cat-name">${cat}</div>
            <div class="cat-count">${companies.length}</div>
          </div>
          <div class="cat-chevron ${isOpen ? 'open' : ''}">▾</div>
        </div>
        <div class="company-grid ${isOpen ? 'open' : ''}">
          ${companies.map(c => renderCard(c)).join('')}
        </div>
      </div>`;
  });

  main.innerHTML = html;
}

function toggleAccordion(cat) {
  if (openCategories.has(cat)) openCategories.delete(cat);
  else openCategories.add(cat);
  renderMain();
}

function renderCard(company) {
  const isSelected = selectedCompanyId === company.id;
  const tagHtml = company.categories.slice(0, 2).map(cat => {
    const c = catColor(cat);
    return `<span class="card-cat-tag" style="color:${c.dot};border-color:${c.border};background:${c.bg}">${cat}</span>`;
  }).join('');

  return `
    <div class="company-card ${isSelected ? 'selected' : ''}" onclick="openDetail('${company.id}')">
      <div class="card-name">
        ${company.name}
        <div class="brazil-badge ${company.hasBrazil ? 'visible' : ''}"></div>
      </div>
      <div class="card-what">${company.what || '—'}</div>
      <div class="card-tags">${tagHtml}</div>
    </div>`;
}

function openDetail(id) {
  const company = allCompanies.find(c => c.id === id);
  if (!company) return;
  selectedCompanyId = id;

  const catHtml = company.categories.map(cat => {
    const c = catColor(cat);
    return `<span class="card-cat-tag" style="font-size:11px;padding:3px 9px;color:${c.dot};border-color:${c.border};background:${c.bg}">${cat}</span>`;
  }).join('');

  const brazilSection = company.brazil ? `
    <div class="detail-section">
      <div class="detail-label">🇧🇷 Brazil</div>
      <div class="detail-brazil">
        <div class="detail-brazil-dot"></div>
        <div class="detail-brazil-text">${company.brazil}</div>
      </div>
    </div>` : '';

  const urlSection = company.url ? `
    <div class="detail-section">
      <a href="${company.url}" target="_blank" class="detail-url">↗ ${company.url.replace(/^https?:\/\//, '').replace(/\/$/, '')}</a>
    </div>` : '';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-close" onclick="closeDetailBtn()">✕</div>
    <div class="detail-name">${company.name}</div>
    <div class="detail-cats">${catHtml}</div>
    ${company.what ? `<div class="detail-section"><div class="detail-label">What they do</div><div class="detail-text">${company.what}</div></div>` : ''}
    ${company.how ? `<div class="detail-section"><div class="detail-label">How / Methodology</div><div class="detail-text">${company.how}</div></div>` : ''}
    ${brazilSection}
    ${urlSection}
    <div class="detail-section">
      <div class="detail-label">My Comments</div>
      <textarea class="comments-area" id="comments-${id}" placeholder="Add your notes, observations, or strategic thoughts...">${company.comments || ''}</textarea>
      <div style="display:flex;align-items:center">
        <button class="save-btn" id="save-btn-${id}" onclick="handleSave('${id}')">Save</button>
        <span class="save-status" id="save-status-${id}"></span>
      </div>
    </div>`;

  document.getElementById('detail-overlay').classList.add('open');
}

function handleSave(id) {
  const textarea = document.getElementById(`comments-${id}`);
  const btn = document.getElementById(`save-btn-${id}`);
  const status = document.getElementById(`save-status-${id}`);
  if (!textarea || !btn || !status) return;
  btn.disabled = true;
  status.className = 'save-status';
  status.textContent = 'saving...';

  fetch('/api/notion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      method: 'PATCH',
      path: `pages/${id}`,
      body: { properties: { Comments: { rich_text: [{ text: { content: textarea.value } }] } } }
    })
  })
  .then(r => r.json())
  .then(parsed => {
    if (parsed.id) {
      status.className = 'save-status success';
      status.textContent = '✓ saved';
      const co = allCompanies.find(c => c.id === id);
      if (co) co.comments = textarea.value;
      setTimeout(() => { status.textContent = ''; }, 2500);
    } else { throw new Error(); }
  })
  .catch(() => {
    status.className = 'save-status error';
    status.textContent = '✗ error';
  })
  .finally(() => { btn.disabled = false; });
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailBtn();
}

function closeDetailBtn() {
  document.getElementById('detail-overlay').classList.remove('open');
  selectedCompanyId = null;
}

// Search
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    if (searchQuery) activeCategory = null;
    buildTagBar();
    renderMain();
  }, 200);
});

// INIT
async function init() {
  try {
    const pages = await fetchAllPages();
    allCompanies = pages.map(parseCompany).filter(Boolean);
    allCompanies.sort((a, b) => a.name.localeCompare(b.name));

    const allBrazil = allCompanies.filter(c => hasBrazilPresence(c)).length;
    const allCats = new Set(allCompanies.flatMap(c => c.categories)).size;
    document.getElementById('stat-companies').textContent = allCompanies.length;
    document.getElementById('stat-cats').textContent = allCats;
    document.getElementById('stat-brazil').textContent = allBrazil;
    document.getElementById('header-meta').textContent =
      `${allCompanies.length} companies · ${allCats} categories · live from Notion`;

    document.getElementById('loading').remove();
    buildTagBar();
    renderMain();
  } catch(e) {
    document.getElementById('loading').innerHTML = `
      <div class="error-msg">
        <strong>Could not load data.</strong> Check that your Notion integration token is set correctly in the HTML file.<br>
        <code style="font-size:11px;opacity:0.5">${e.message}</code>
      </div>`;
  }
}

init();

function downloadHTML() {
  fetch(window.location.href)
    .then(r => r.text())
    .then(html => {
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'digital-media-landscape.html';
      a.click();
      URL.revokeObjectURL(url);
    })
    .catch(() => { window.open(window.location.href, '_blank'); });
}
</script>
